{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 no-print">
    <h4>{{ title }}</h4>
    <div class="d-flex gap-2">
        <a href="?export=excel&date_from={{ date_from }}&date_to={{ date_to }}&q={{ search }}" class="btn btn-success btn-sm">Excel</a>
        <a href="?export=pdf&date_from={{ date_from }}&date_to={{ date_to }}&q={{ search }}" class="btn btn-danger btn-sm">PDF</a>
        <button onclick="window.print()" class="btn btn-secondary btn-sm">طباعة</button>
    </div>
</div>
<form method="get" class="row g-2 mb-3 no-print">
    <div class="col-md-3"><input type="date" name="date_from" class="form-control" value="{{ date_from }}"></div>
    <div class="col-md-3"><input type="date" name="date_to" class="form-control" value="{{ date_to }}"></div>
    <div class="col-md-3"><input type="text" name="q" class="form-control" placeholder="بحث" value="{{ search }}"></div>
    <div class="col-md-3"><button class="btn btn-primary w-100">تصفية</button></div>
</form>
<div class="card"><div class="table-responsive"><table class="table mb-0"><thead><tr>{% for h in headers %}<th>{{ h }}</th>{% endfor %}</tr></thead><tbody>{% for row in rows %}<tr>{% for cell in row %}<td>{{ cell }}</td>{% endfor %}</tr>{% empty %}<tr><td colspan="{{ headers|length }}" class="text-center text-muted">لا توجد بيانات</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
