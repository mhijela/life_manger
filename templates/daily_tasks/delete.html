{% extends 'base.html' %}
{% block title %}حذف مهمة{% endblock %}
{% block breadcrumb %}
<a href="{% url 'daily_tasks:list' %}" class="text-muted text-decoration-none">المهام اليومية</a> / حذف
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
                <h5 class="mt-3">حذف المهمة «{{ task.title }}»؟</h5>
                <p class="text-muted">لا يمكن التراجع عن هذا الإجراء.</p>
                <form method="post" class="mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">تأكيد الحذف</button>
                    <a href="{% url 'daily_tasks:list' %}" class="btn btn-secondary">إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
