{% extends 'base.html' %}
{% block title %}حذف مشترك{% endblock %}
{% block content %}
<div class="card"><div class="card-body text-center py-5">
    <h5>حذف {{ subscriber.full_name }}؟</h5>
    <form method="post" class="mt-3">{% csrf_token %}
        <button type="submit" class="btn btn-danger">تأكيد الحذف</button>
        <a href="{% url 'subscribers:detail' subscriber.pk %}" class="btn btn-secondary">إلغاء</a>
    </form>
</div></div>
{% endblock %}
