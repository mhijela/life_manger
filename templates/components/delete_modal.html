<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center py-4">
                <div class="modal-danger-icon"><i class="bi bi-trash3"></i></div>
                <h5 class="modal-title mb-2" id="deleteModalLabel">تأكيد الحذف</h5>
                <p class="text-muted mb-0">هل أنت متأكد من حذف هذا السجل؟<br>لا يمكن التراجع عن هذا الإجراء.</p>
            </div>
            <div class="modal-footer justify-content-center gap-2">
                <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">إلغاء</button>
                <form id="deleteForm" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash3"></i> حذف
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
