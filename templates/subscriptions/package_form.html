{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block breadcrumb %}
<a href="{% url 'subscriptions:packages' %}" class="text-muted text-decoration-none">الباقات</a> / {{ title }}
{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card">
    <div class="card-header">{{ title }}</div>
    <div class="card-body"><form method="post">{% csrf_token %}
        {% for field in form %}<div class="mb-3"><label>{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>{% endfor %}
        <button type="submit" class="btn btn-primary">حفظ</button>
        <a href="{% url 'subscriptions:packages' %}" class="btn btn-secondary">إلغاء</a>
    </form></div>
</div></div></div>
{% endblock %}
