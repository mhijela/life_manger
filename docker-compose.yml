# Coolify: Docker Compose — خدمة واحدة فقط (بدون Redis/Celery)
# 1) أنشئ PostgreSQL في Coolify وانسخ Internal URL → DATABASE_URL
# 2) الصق المتغيرات في Environment ثم Deploy

services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - media_data:/app/media
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PORT: ${PORT:-8000}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      DB_SSL: ${DB_SSL:-False}
      USE_CELERY: ${USE_CELERY:-False}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/' % os.environ.get('PORT','8000'), timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  media_data:
