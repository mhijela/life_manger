# Coolify / production Docker Compose
# In Coolify: New Resource → Docker Compose → select this file

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inms}
      POSTGRES_USER: ${POSTGRES_USER:-inms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inms} -d ${POSTGRES_DB:-inms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inms

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - inms

  web:
    build: .
    restart: unless-stopped
    volumes:
      - media_data:/app/media
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-inms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inms}
      CELERY_BROKER_URL: redis://redis:6379/0
      DB_SSL: ${DB_SSL:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inms

  celery:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info
    volumes:
      - media_data:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://${POSTGRES_USER:-inms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inms}
      CELERY_BROKER_URL: redis://redis:6379/0
      DB_SSL: ${DB_SSL:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - inms

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://${POSTGRES_USER:-inms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inms}
      CELERY_BROKER_URL: redis://redis:6379/0
      DB_SSL: ${DB_SSL:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - inms

volumes:
  postgres_data:
  redis_data:
  media_data:

networks:
  inms:
    driver: bridge
